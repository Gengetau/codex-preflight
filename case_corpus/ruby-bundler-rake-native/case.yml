id: ruby-bundler-rake-native
title: Ruby Bundler sources, Rake command, and native extension
category: ecosystem-ruby
command: bundle exec rake install
expectedDecision: WARN
expectedRules:
  - RUBY_BUNDLER_GIT_SOURCE
  - RUBY_BUNDLER_LOCAL_PATH_SOURCE
