name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -e ".[dev,mcp]"

      - name: Check marketplace plugin copy
        run: python scripts/sync_marketplace_plugin.py --check

      - name: Install isolated release verifier
        run: python -m pip install --target "${{ runner.temp }}/codex-preflight-release-verify" --no-deps .

      - name: Verify release readiness
        env:
          PYTHONPATH: ${{ runner.temp }}/codex-preflight-release-verify
        run: python -P -m codex_preflight_cli.main release verify --root . --expected-version 0.3.7 --expected-commit HEAD --format json

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

  mcp-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install MCP extras
        run: python -m pip install -e ".[dev,mcp]"

      - name: List MCP tools
        run: codex-preflight-mcp --list-tools

      - name: Run MCP runtime smoke tests
        run: pytest tests/test_mcp_runtime_smoke.py
